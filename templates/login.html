<!DOCTYPE html>
<html>
<head>
    <title>Login - VVN Combat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab-container { display: flex; margin-bottom: 20px; background: #2a2a2a; border-radius: 8px; padding: 5px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; text-align: center; border-radius: 6px; font-weight: bold; transition: 0.3s; color: #888; }
        .tab.active { background: #00ff88; color: #000; }
        
        .form-group { display: none; }
        .form-group.active { display: block; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .id-badge { color: #00ff88; background: rgba(0,255,136,0.1); padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="margin-bottom: 20px;">
            <h2 style="margin: 0;">VVN SYSTEM</h2>
            <span class="id-badge">Match ID hiện tại: {{state.match_id}}</span>
        </div>

        <div class="tab-container">
            <div class="tab active" onclick="switchTab('judge')">JUDGE</div>
            <div class="tab" onclick="switchTab('admin')">ADMIN</div>
        </div>

        <form id="judge-form" class="form-group active" action="/auth" method="post">
            <label style="font-size: 14px; color: #aaa;">Chọn tên của bạn:</label>
            <select name="user">
                {% for name in state.allowed_judges %}
                    <option value="{{name}}">{{name}}</option>
                {% endfor %}
            </select>
            <input name="match_id" type="text" placeholder="Nhập mã trận đấu (ID)" required>
            <button type="submit">VÀO CHẤM ĐIỂM</button>
        </form>

        <form id="admin-form" class="form-group" action="/auth" method="post">
            <input type="hidden" name="user" value="admin">
            <label style="font-size: 14px; color: #aaa;">Mật khẩu quản trị:</label>
            <input name="pass" type="password" placeholder="Mật khẩu Admin" required>
            <button type="submit" style="background: #0088ff; color: white;">ĐĂNG NHẬP ADMIN</button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-group').forEach(f => f.classList.remove('active'));
            
            if(type === 'judge') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('judge-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('admin-form').classList.add('active');
            }
        }
    </script>
</body>
</html>
