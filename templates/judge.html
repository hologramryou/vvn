<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Judge Panel - VVN Combat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .match-info { background: #1a1a1a; padding: 12px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-radius: 10px; margin-bottom: 10px; }
        .user-tag { color: #00ff88; font-weight: bold; }
        
        #status-text { font-weight: bold; padding: 2px 8px; border-radius: 4px; }
        .running { background: #008800; color: white; }
        .stopped { background: #aa0000; color: white; }

        #timer { font-size: 60px; color: #ffcc00; font-weight: 800; margin: 10px 0; height: 80px; display: flex; align-items: center; justify-content: center; }
        #timer.active { color: #ff4444; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; padding-bottom: 20px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        .btn { border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; transition: 0.1s; position: relative; overflow: hidden; active { transform: scale(0.95); opacity: 0.8; } }
        
        /* Blue Team */
        .btn-blue { background: #0066ff; height: 100px; font-size: 24px; box-shadow: 0 6px #0044bb; }
        .btn-blue-sm { background: #0055dd; height: 60px; font-size: 18px; box-shadow: 0 4px #0033aa; }
        
        /* Red Team */
        .btn-red { background: #ff3333; height: 100px; font-size: 24px; box-shadow: 0 6px #bb2222; }
        .btn-red-sm { background: #dd2222; height: 60px; font-size: 18px; box-shadow: 0 4px #aa1111; }

        .btn:active { transform: translateY(4px); box-shadow: none; }
        .label { display: block; font-size: 12px; opacity: 0.8; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="match-info">
        <div>ID: <span id="display-id">{{state.match_id}}</span></div>
        <div class="user-tag">{{user}}</div>
        <div id="status-text" class="stopped">READY</div>
    </div>

    <div id="timer">READY</div>

    <div class="score-grid">
        <div class="btn-group">
            <span class="label" id="p1-label">{{state.p1}}</span>
            <button class="btn btn-blue" onclick="sendScore(p1Name, 2)">+2</button>
            <button class="btn btn-blue-sm" onclick="sendScore(p1Name, 1)">+1</button>
        </div>

        <div class="btn-group">
            <span class="label" id="p2-label">{{state.p2}}</span>
            <button class="btn btn-red" onclick="sendScore(p2Name, 2)">+2</button>
            <button class="btn btn-red-sm" onclick="sendScore(p2Name, 1)">+1</button>
        </div>
    </div>

    <script>
        const socket = io();
        let isRunning = false;
        let p1Name = "{{state.p1}}";
        let p2Name = "{{state.p2}}";

        // Hàm này phải nằm ngoài cùng của thẻ script để HTML gọi được
        function sendScore(target, pts) {
            if(!isRunning) {
                alert("Trận đấu đang tạm dừng hoặc chưa bắt đầu!");
                return;
            }
            console.log("Submitting:", target, pts);
            socket.emit('submit_point', {target: target, pts: pts});
            
            // Rung phản hồi nếu dùng điện thoại
            if (navigator.vibrate) navigator.vibrate(50);
        }

        socket.on('match_status', (data) => {
            isRunning = data.is_running;
            const st = document.getElementById('status-text');
            const timerEl = document.getElementById('timer');
            
            if(isRunning) {
                st.innerText = "ĐANG ĐẤU";
                st.className = "running";
                if(timerEl.innerText === "READY") timerEl.innerText = "---";
            } else {
                st.innerText = "TẠM DỪNG";
                st.className = "stopped";
            }
        });

        socket.on('update_ui', (data) => {
            document.getElementById('display-id').innerText = data.match_id;
            p1Name = data.p1;
            p2Name = data.p2;
            document.getElementById('p1-label').innerText = p1Name;
            document.getElementById('p2-label').innerText = p2Name;
        });

        socket.on('start_3s_timer', (data) => {
            let count = data.duration;
            const timerEl = document.getElementById('timer');
            timerEl.classList.add('active');
            timerEl.innerText = count + "s";
            
            let interval = setInterval(() => {
                count--;
                if(count > 0) {
                    timerEl.innerText = count + "s";
                } else {
                    timerEl.innerText = "DONE";
                    timerEl.classList.remove('active');
                    clearInterval(interval);
                }
            }, 1000);
        });

        socket.on('end_3s_timer', () => {
            setTimeout(() => {
                document.getElementById('timer').innerText = isRunning ? "---" : "READY";
            }, 1000);
        });

        socket.on('force_logout', () => {
            window.location.href = "/logout";
        });
    </script>
</body>
</html>
