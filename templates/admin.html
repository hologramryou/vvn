<!DOCTYPE html>
<html>
<head>
    <title>Admin - VVN Combat (Realtime Fix)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #252525; color: #00ff88; }
        input { background: #2a2a2a; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; margin-bottom: 5px; }
        .btn { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        #timer-display { font-size: 48px; color: #ffcc00; text-align: center; margin: 10px 0; font-family: monospace; }
        .history-container { max-height: 500px; overflow-y: auto; border: 1px solid #444; scroll-behavior: smooth; }
        
        .new-row { background: #2a2a00 !important; animation: highlight 3s ease-out; }
        @keyframes highlight {
            from { background: #00ff8844; }
            to { background: transparent; }
        }
        .text-p1 { color: #0088ff; font-weight: bold; }
        .text-p2 { color: #ff4444; font-weight: bold; }
        .judge-input-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #252525; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .judge-input-group input { width: 90%; font-size: 12px; text-align: center; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; border: 2px solid #00ff88; padding: 30px; z-index: 100; width: 60%; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card">
            <h3>1. THIẾT LẬP TRẬN ĐẤU</h3>
            <div style="display: flex; gap: 10px;">
                <div>ID Trận: <br><input id="m_id" value="{{state.match_id}}" style="width: 70px;"></div>
                <div>Thời gian: <br><input id="m_time" type="number" value="120" style="width: 70px;">s</div>
            </div>
            
            <div style="margin-top: 10px; display: flex; gap: 10px;">
                <div style="flex:1">Xanh (P1): <br><input id="p1" value="{{state.p1}}" style="width: 100%;"></div>
                <div style="flex:1">Đỏ (P2): <br><input id="p2" value="{{state.p2}}" style="width: 100%;"></div>
            </div>

            <h4 style="margin: 15px 0 5px 0; color: #00ff88;">5 TRỌNG TÀI:</h4>
            <div class="judge-input-group">
                {% for i in range(5) %}
                <input class="j_name" value="{{state.allowed_judges[i] if state.allowed_judges and state.allowed_judges[i] else 'Judge '+(i+1)|string}}">
                {% endfor %}
            </div>

            <button class="btn" style="background: #0088ff; color: white; width: 100%;" onclick="updateMatch()">CẬP NHẬT</button>
            <div id="timer-display">02:00</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background: #00ff88; flex: 1; height: 50px;" onclick="controlMatch(true)">START</button>
                <button class="btn" style="background: #ff4444; color: white; flex: 1;" onclick="controlMatch(false)">PAUSE</button>
            </div>
            <button class="btn" style="background: #fff; width: 100%; margin-top: 10px; color: #000;" onclick="finishMatch()">KẾT THÚC & XEM TỔNG ĐIỂM</button>
        </div>

        <div class="card">
            <h3>2. LIVE SCOREBOARD</h3>
            <div id="vote-status" style="background: #333; padding: 5px; text-align: center; color: #888; border-radius: 4px;">SẴN SÀNG</div>
            <table>
                <thead><tr><th>J1</th><th>J2</th><th>J3</th><th>J4</th><th>J5</th></tr></thead>
                <tbody>
                    <tr style="height: 60px; font-size: 16px;">
                        <td id="v1">-</td><td id="v2">-</td><td id="v3">-</td><td id="v4">-</td><td id="v5">-</td>
                    </tr>
                </tbody>
            </table>

            <h3 style="margin-top: 20px;">3. LỊCH SỬ CHI TIẾT (LIVE)</h3>
            <div class="history-container" id="hist-scroll">
                <table>
                    <thead><tr><th>TIME</th><th>J1</th><th>J2</th><th>J3</th><th>J4</th><th>J5</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="final-popup" class="popup">
        <h1 style="color: #00ff88;">KẾT QUẢ CHUNG CUỘC</h1>
        <div style="display: flex; justify-content: space-around; font-size: 40px; font-weight: bold;">
            <div><p id="res-p1-n" style="font-size: 20px;"></p><span id="res-p1-s" class="text-p1">0</span></div>
            <div style="align-self: center; font-size: 20px; color: #555;">VS</div>
            <div><p id="res-p2-n" style="font-size: 20px;"></p><span id="res-p2-s" class="text-p2">0</span></div>
        </div>
        <button class="btn" style="margin-top: 30px; padding: 10px 50px; background: #00ff88;" onclick="location.reload()">XÁC NHẬN & TIẾP TỤC</button>
    </div>

    <script>
        const socket = io();
        let timeLeft = 120;
        let timerInt;

        function createHistoryRow(resultObj, timeStr) {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${timeStr}</td>`;
            const currentJudges = Array.from(document.querySelectorAll('.j_name')).map(i => i.value);
            const p1_name = document.getElementById('p1').value;

            currentJudges.forEach((jName) => {
                const vote = resultObj[jName];
                if(vote) {
                    let colorClass = vote.target === p1_name ? "text-p1" : "text-p2";
                    row.innerHTML += `<td class="${colorClass}">${vote.target}<br>(+${vote.pts})</td>`;
                } else {
                    row.innerHTML += `<td style="color:#444">-</td>`;
                }
            });
            return row;
        }

        function loadFullHistory() {
            fetch('/get_match_history/' + document.getElementById('m_id').value)
                .then(r => r.json()).then(data => {
                    const tbody = document.getElementById('history-body');
                    tbody.innerHTML = "";
                    data.forEach(item => {
                        let res = typeof item.result === 'string' ? JSON.parse(item.result) : item.result;
                        tbody.appendChild(createHistoryRow(res, item.time));
                    });
                });
        }

        // --- SOCKET LOGIC ---
                socket.on('live_sync', (data) => {
                    console.log(">>> [LIVE_SYNC] Dữ liệu từ socket:", data);
                    // Hiển thị điểm đang nhảy trên Scoreboard (vẫn giữ nguyên)
                    const currentJudges = Array.from(document.querySelectorAll('.j_name')).map(i => i.value);
                    const p1_name = document.getElementById('p1').value;
                    currentJudges.forEach((jName, index) => {
                        const cell = document.getElementById(`v${index+1}`);
                        if(data[jName]) {
                            cell.innerText = `${data[jName].target} (+${data[jName].pts})`;
                            cell.className = data[jName].target === p1_name ? "text-p1" : "text-p2";
                        }
                    });
                    document.getElementById('vote-status').innerText = "ĐANG CHẤM...";
                    document.getElementById('vote-status').style.background = "#0052cc";
                });
        
        
                socket.on('RTLS', (data) => {
                    console.log(">>> [LIVE_SYNC] Dữ liệu từ socket:", data);
                    // Hiển thị điểm đang nhảy trên Scoreboard (vẫn giữ nguyên)
                    const currentJudges = Array.from(document.querySelectorAll('.j_name')).map(i => i.value);
                    const p1_name = document.getElementById('p1').value;
                    currentJudges.forEach((jName, index) => {
                        const cell = document.getElementById(`v${index+1}`);
                        if(data[jName]) {
                            cell.innerText = `${data[jName].target} (+${data[jName].pts})`;
                            cell.className = data[jName].target === p1_name ? "text-p1" : "text-p2";
                        }
                    });
                    document.getElementById('vote-status').innerText = "ĐANG CHẤM...";
                    document.getElementById('vote-status').style.background = "#0052cc";
                });

                socket.on('end_3s_timer', (data) => {
                    console.log("Đã nhận dữ liệu chốt điểm:", data); // Để debug
                    
                    const resultData = data.result;
                    const timeData = data.time || new Date().toLocaleTimeString().split(' ')[0];

                    if(resultData && Object.keys(resultData).length > 0) {
                        const tbody = document.getElementById('history-body');
                        
                        // Tạo hàng mới và chèn lên ĐẦU bảng (firstChild)
                        const newRow = createHistoryRow(resultData, timeData);
                        newRow.classList.add('new-row');
                        tbody.insertBefore(newRow, tbody.firstChild);
                        
                        // Cuộn khung nhìn lên trên cùng để thấy dòng mới nhất
                        document.getElementById('hist-scroll').scrollTop = 0;
                    }
                    
                    // Xóa Scoreboard Live sau 1.5 giây để chờ đợt chấm mới
                    setTimeout(() => {
                        for(let i=1; i<=5; i++) {
                            const cell = document.getElementById(`v${i}`);
                            cell.innerText = "-";
                            cell.className = "";
                        }
                        document.getElementById('vote-status').innerText = "SẴN SÀNG";
                        document.getElementById('vote-status').style.background = "#333";
                    }, 1500);
                });

        // --- CONTROLS ---
        function updateMatch() {
                    const matchId = document.getElementById('m_id').value;
                    
                    // --- BỔ SUNG: Xóa trắng bảng trên giao diện Admin ngay lập tức ---
                    document.getElementById('history-body').innerHTML = "";
                    // -------------------------------------------------------------

                    socket.emit('setup_match', {
                        match_id: matchId,
                        p1: document.getElementById('p1').value,
                        p2: document.getElementById('p2').value,
                        judges: Array.from(document.querySelectorAll('.j_name')).map(i => i.value)
                    });
                    
                    // Reset lại thời gian nếu cần
                    timeLeft = parseInt(document.getElementById('m_time').value);
                    updateTimerDisplay();
                }
        
        function controlMatch(status) {
            socket.emit('toggle_match', {status: status});
            if(status) {
                if(!timerInt) {
                    timerInt = setInterval(() => {
                        if(timeLeft > 0) { timeLeft--; updateTimerDisplay(); }
                        else { finishMatch(); }
                    }, 1000);
                }
            } else {
                clearInterval(timerInt); timerInt = null;
            }
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
        }

        function finishMatch() {
            controlMatch(false);
            socket.emit('finish_match_event');
            fetch('/get_final_score/' + document.getElementById('m_id').value)
                .then(r => r.json()).then(data => {
                    document.getElementById('final-popup').style.display = 'block';
                    document.getElementById('res-p1-n').innerText = document.getElementById('p1').value;
                    document.getElementById('res-p2-n').innerText = document.getElementById('p2').value;
                    document.getElementById('res-p1-s').innerText = data.p1;
                    document.getElementById('res-p2-s').innerText = data.p2;
                });
        }

        window.onload = loadFullHistory;
    </script>
</body>
</html>
